services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: ji-ledger-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://ji-ledger.onrender.com,https://ji-ledger-frontend.onrender.com
    disk:
      name: ji-ledger-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  # ── Frontend Static Site ─────────────────────────────────
  - type: web
    name: ji-ledger-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: VITE_BACKEND_URL
        value: https://ji-ledger-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
